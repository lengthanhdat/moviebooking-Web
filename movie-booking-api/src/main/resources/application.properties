spring.datasource.url=jdbc:mysql://localhost:3306/movie_booking?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&useUnicode=true&characterEncoding=utf8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.connection.useUnicode=true
spring.jpa.properties.hibernate.connection.characterEncoding=utf8
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.mail=DEBUG


# JWT config

jwt_secret=supersecretkey1234567890abcdef1234567890abcd
jwt.expiration=86400000

# 86400000 ms = 1 day

server.error.include-message=always
server.error.include-binding-errors=never
server.error.include-stacktrace=never
reset.base-url=http://localhost:8081/reset

server.port=8081
# Redis configuration
# spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
# spring.data.redis.port=${SPRING_REDIS_PORT:6379}
# Use simple in-memory cache to avoid external dependency (Redis) requirement for local dev
spring.cache.type=simple
# spring.cache.redis.time-to-live=600000

# TMDB configuration: supply via environment variables for security
tmdb.api-key=${TMDB_API_KEY:}
tmdb.read-access-token=${TMDB_READ_ACCESS_TOKEN:}
verify.base-url=${VERIFY_BASE_URL:http://localhost:${server.port}/api/auth/verify}

# Mail configuration (bound to environment variables; do NOT put secrets here)
spring.mail.host=${SPRING_MAIL_HOST:${mail.smtp.host:smtp.gmail.com}}
spring.mail.port=${SPRING_MAIL_PORT:${mail.smtp.port:587}}
spring.mail.username=${SPRING_MAIL_USERNAME:${mail.smtp.user:}}
spring.mail.password=${SPRING_MAIL_PASSWORD:${mail.smtp.password:}}
spring.mail.protocol=${SPRING_MAIL_PROTOCOL:smtp}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:${mail.smtp.auth:true}}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:${mail.smtp.starttls.enable:true}}
spring.mail.properties.mail.smtp.ssl.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_ENABLE:${mail.smtp.ssl.enable:false}}
spring.mail.properties.mail.debug=${SPRING_MAIL_PROPERTIES_MAIL_DEBUG:${mail.debug:true}}
spring.mail.properties.mail.smtp.ssl.trust=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_TRUST:${mail.smtp.ssl.trust:smtp.gmail.com}}
